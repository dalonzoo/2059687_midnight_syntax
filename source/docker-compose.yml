# ============================================================================
# Mars Habitat Automation Platform — Docker Compose
# ============================================================================
# Starts the entire platform with: docker compose up
#
# Services:
#   - simulator:          Mars IoT simulator (provided, DO NOT MODIFY)
#   - zookeeper + kafka:  Message broker infrastructure
#   - postgres:           Rule persistence database
#   - ingestion-service:  Polls/streams sensor data → Kafka
#   - processing-service: Evaluates rules, manages state, controls actuators
#   - dashboard-service:  WebSocket relay + API proxy for the frontend
#   - frontend:           React SPA served via Nginx
# ============================================================================

version: "3.9"

services:
  # --------------------------------------------------------------------------
  # Provided simulator — DO NOT MODIFY
  # --------------------------------------------------------------------------
  simulator:
    image: mars-iot-simulator:multiarch_v1
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Infrastructure: Kafka (via Zookeeper) + PostgreSQL
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_MS: 3600000        # 1-hour retention (no history needed)
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mars
      POSTGRES_PASSWORD: mars
      POSTGRES_DB: mars_rules
      PGDATABASE: mars_rules
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mars -d mars_rules -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Application Services
  # --------------------------------------------------------------------------
  ingestion-service:
    build: ./ingestion-service
    depends_on:
      simulator:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SIMULATOR_URL: http://simulator:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POLL_INTERVAL_SECONDS: "5"
    restart: unless-stopped

  processing-service:
    build: ./processing-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      simulator:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: "postgresql+asyncpg://mars:mars@postgres:5432/mars_rules"
      SIMULATOR_URL: http://simulator:8080
    restart: unless-stopped

  dashboard-service:
    build: ./dashboard-service
    depends_on:
      kafka:
        condition: service_healthy
      processing-service:
        condition: service_started
    ports:
      - "8082:8002"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PROCESSING_SERVICE_URL: http://processing-service:8001
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - dashboard-service
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:
