# ============================================================================
# Nginx configuration for the Mars Habitat Dashboard frontend.
#
# - Serves the React SPA at /
# - Proxies /api/* to the dashboard-service backend
# - Proxies /ws to the dashboard-service WebSocket endpoint
# ============================================================================

server {
    listen 80;
    server_name localhost;

    # --- Serve React SPA ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy REST API calls to dashboard-service ---
    location /api/ {
        proxy_pass http://dashboard-service:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Proxy WebSocket to dashboard-service ---
    location /ws {
        proxy_pass http://dashboard-service:8002/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
